<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini GD</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{background:#111;display:block;margin:auto}
.screen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  background:rgba(0,0,0,0.7);
}
button{padding:12px 24px;margin:10px;font-size:18px;border:none;border-radius:8px}
#gameUI{position:absolute;top:10px;left:10px}
</style>
</head>
<body>

<div id="startScreen" class="screen">
  <h1>Mini GD</h1>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOverScreen" class="screen" style="display:none;">
  <h1 id="finalScore"></h1>
  <button onclick="retry()">RETRY</button>
</div>

<div id="gameUI">Score: 0</div>
<canvas id="c" width="900" height="300"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let state="start", score=0, camera=0;
let p;

function resetPlayer(){
  p={x:100,y:200,v:0,rot:0,mode:"cube",gravity:1};
}

function startGame(){
  state="play"; score=0; camera=0;
  resetPlayer();
  document.getElementById("startScreen").style.display="none";
}

function retry(){
  state="play"; score=0; camera=0;
  resetPlayer();
  document.getElementById("gameOverScreen").style.display="none";
}

function input(){
  if(state!=="play") return;
  if(p.mode==="cube" && p.y>=200) p.v=-12*p.gravity;
}
document.addEventListener("click",input);
document.addEventListener("touchstart",input);

let map=[
  {type:"spike",x:400},
  {type:"pad",x:600},
  {type:"portal",x:800},
  {type:"wavePortal",x:1000}
];

function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  if(state==="play"){
    camera+=5;
    score++;

    if(p.mode==="cube"){
      p.v+=0.8*p.gravity;
      p.y+=p.v;
      if(p.y>200){p.y=200;p.v=0;p.rot=0;}
      else{p.rot+=10;}
    }

    if(p.mode==="wave"){
      p.y += p.waveUp ? -5 : 5;
    }

    ctx.save();
    ctx.translate(p.x,p.y);

    if(p.mode==="cube"){
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle="cyan";
      ctx.fillRect(-15,-15,30,30);
    } else {
      ctx.fillStyle="lime";
      ctx.fillRect(0,0,20,10);
    }

    ctx.restore();

    ctx.fillStyle="#333";
    ctx.fillRect(0,230,900,70);

    for(let o of map){
      let x=o.x-camera;

      if(o.type==="spike"){
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.moveTo(x,230);
        ctx.lineTo(x+20,230);
        ctx.lineTo(x+10,200);
        ctx.fill();

        if(p.x<x+20 && p.x+30>x && p.y>180){
          gameOver();
        }
      }

      if(o.type==="pad"){
        ctx.fillStyle="yellow";
        ctx.fillRect(x,210,20,20);
        if(p.x<x+20 && p.x+30>x && p.y>=200){
          p.v=-18;
        }
      }

      if(o.type==="portal"){
        ctx.fillStyle="blue";
        ctx.fillRect(x,180,20,50);
        if(p.x<x+20 && p.x+30>x){
          p.gravity*=-1;
        }
      }

      if(o.type==="wavePortal"){
        ctx.fillStyle="purple";
        ctx.fillRect(x,180,20,50);
        if(p.x<x+20 && p.x+30>x){
          p.mode="wave";
        }
      }
    }

    document.getElementById("gameUI").innerText="Score: "+score;
  }

  requestAnimationFrame(loop);
}

function gameOver(){
  state="over";
  document.getElementById("gameOverScreen").style.display="flex";
  document.getElementById("finalScore").innerText="Score: "+score;
}

resetPlayer();
loop();
</script>

</body>
</html>
